body { font-family: 'Pretendard', sans-serif; }

.speech-bubble { position: absolute; background: white; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 5px 8px; font-size: 9px; color: #334155; white-space: normal; pointer-events: none; z-index: 20; box-shadow: 0 2px 6px rgba(0,0,0,0.08); opacity: 0; transition: opacity 0.3s; max-width: 140px; line-height: 1.4; }

<script>
const office = document.getElementById('office');
let running = false, stepIdx = 0;

const agents = {
  orc: document.getElementById('orchestrator'),
  pla: document.getElementById('planner'),
  des: document.getElementById('designer'),
  dev: document.getElementById('developer'),
  qa: document.getElementById('qa'),
  rnd: document.getElementById('rnd')
};

const bubbles = {
  orc: document.getElementById('bubble-orc'),
  pla: document.getElementById('bubble-pla'),
  des: document.getElementById('bubble-des'),
  dev: document.getElementById('bubble-dev'),
  qa: document.getElementById('bubble-qa'),
  rnd: document.getElementById('bubble-rnd')
};

function getCenter(el) {
  const r = el.getBoundingClientRect();
  const or = office.getBoundingClientRect();
  return { x: r.left - or.left + r.width/2, y: r.top - or.top + r.height/2 };
}

function showBubble(who, text, duration=2000) {
  const b = bubbles[who];
  b.textContent = text;
  b.classList.add('visible');
  return new Promise(res => setTimeout(() => { b.classList.remove('visible'); res(); }, duration));
}

function moveAgent(el, tx, ty, duration=700) {
  return new Promise(res => {
    const start = { x: parseInt(el.style.left), y: parseInt(el.style.top) };
    const startTime = performance.now();
    function anim(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      el.style.left = (start.x + (tx - start.x) * ease) + 'px';
      el.style.top  = (start.y + (ty - start.y) * ease) + 'px';
      if (t < 1) requestAnimationFrame(anim); else res();
    }
    requestAnimationFrame(anim);
  });
}

function sendPacket(fromEl, toEl, emoji, color='#faeeda', borderColor='#FAC775') {
  return new Promise(res => {
    const from = getCenter(fromEl);
    const to   = getCenter(toEl);
    const pkt  = document.createElement('div');
    pkt.className = 'task-packet';
    pkt.style.background = color;
    pkt.style.borderColor = borderColor;
    pkt.style.border = '1.5px solid ' + borderColor;
    pkt.textContent = emoji;
    pkt.style.left  = (from.x - 13) + 'px';
    pkt.style.top   = (from.y - 9) + 'px';
    office.appendChild(pkt);
    const startTime = performance.now();
    const dur = 700;
    function anim(now) {
      const t = Math.min((now - startTime)/dur, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      pkt.style.left = (from.x - 13 + (to.x - from.x) * ease) + 'px';
      pkt.style.top  = (from.y - 9 + (to.y - from.y) * ease - Math.sin(t*Math.PI)*25) + 'px';
      if (t < 1) requestAnimationFrame(anim); else { pkt.remove(); res(); }
    }
    requestAnimationFrame(anim);
  });
}

function addLog(who, color, name, text) {
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">${t}</span><span class="log-agent" style="color:${color}">[${name}]</span>${text}`;
  const lp = document.getElementById('log-entries');
  lp.appendChild(el);
  lp.scrollTop = lp.scrollHeight;
}

const agentNames = { orc:'이경희', pla:'이경자', rnd:'Evy', des:'허차장', dev:'태희차장', qa:'지과장' };
const agentRoles = { orc:'오케스트레이터', pla:'기획자', rnd:'R&D', des:'디자이너', dev:'개발자', qa:'QA' };

function glowAgent(who) {
  Object.values(agents).forEach(a => a.classList.remove('active-glow'));
  if (who && agents[who]) agents[who].classList.add('active-glow');
}

function shake(el) {
  let x = 0;
  const orig = parseInt(el.style.left);
  const anim = () => {
    x++;
    el.style.left = (orig + Math.sin(x*1.2)*4) + 'px';
    if (x < 10) requestAnimationFrame(anim); else el.style.left = orig+'px';
  };
  requestAnimationFrame(anim);
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

const steps = [
  async () => {
    document.getElementById('status-text').textContent = '1/10 — 오케스트레이터가 작업 분석 중...';
    glowAgent('orc');
    shake(agents.orc);
    await showBubble('orc', '📊 새 게임 콘텐츠 개발 시작! 작업을 분배할게요.', 2000);
    addLog('orc','#E8593C','이경희(오케스트레이터)','새 게임 콘텐츠 개발 수신. 에이전트 팀에 작업 분배 시작');
  },
  async () => {
    document.getElementById('status-text').textContent = '2/10 — 기획자에게 PRD 작성 위임...';
    glowAgent('pla');
    await moveAgent(agents.orc, 150, 190);
    await sendPacket(agents.orc, agents.pla, '📋', '#dbeafe','#3B8BD4');
    await showBubble('orc', '기획자님, PRD 작성 부탁드려요!', 1500);
    addLog('orc','#E8593C','이경희(오케스트레이터)','→ 기획자에게 "PRD 작성 및 요구사항 정리" 위임');
    await wait(200);
    shake(agents.pla);
    await showBubble('pla','PRD 작성 및 업그레이드 시작합니다!', 1500);
    addLog('pla','#3B8BD4','이경자(기획자)','PRD 작성 작업 수신. 작업 시작');
  },
  async () => {
    document.getElementById('status-text').textContent = '3/10 — 기획자 ↔ R&D 협업 중...';
    glowAgent('rnd');
    await sendPacket(agents.pla, agents.rnd, '📄', '#cffafe','#0891b2');
    await showBubble('pla', 'R&D님, PRD 교육 효과 검증 부탁드려요!', 1500);
    addLog('pla','#3B8BD4','이경자(기획자)','→ R&D에게 PRD 교육적 효과 검증 요청');
    await wait(300);
    shake(agents.rnd);
    await showBubble('rnd', 'CEFR 기준 확인 후 피드백 드릴게요!', 1500);
    addLog('rnd','#7F77DD','Evy(R&D)','PRD 검토 시작. CEFR 난이도 기준 적용');
    await wait(300);
    await sendPacket(agents.rnd, agents.pla, '✏️', '#dbeafe','#3B8BD4');
    await showBubble('rnd', '난이도 조정 피드백 완료!', 1200);
    addLog('rnd','#7F77DD','Evy(R&D)','→ 기획자에게 난이도 조정 피드백 전달');
    await showBubble('pla', '피드백 반영! PRD 업데이트합니다.', 1200);
    addLog('pla','#3B8BD4','이경자(기획자)','R&D 피드백 반영하여 PRD 업데이트');
  },
  async () => {
    document.getElementById('status-text').textContent = '4/10 — 디자이너에게 화면 설계 위임...';
    glowAgent('des');
    await moveAgent(agents.orc, 250, 185);
    await sendPacket(agents.orc, agents.des, '🎨', '#ede9fe','#7F77DD');
    await showBubble('orc', '디자이너님, 화면 스케일 적용해 주세요!', 1500);
    addLog('orc','#E8593C','이경희(오케스트레이터)','→ 디자이너에게 "화면 스케일 및 디자인 규정" 위임');
    await wait(200);
    shake(agents.des);
    await showBubble('des', '공통 디자인 규정 적용 시작! 🎨', 1500);
    addLog('des','#0891b2','허차장(디자이너)','화면 스케일 및 디자인 규정 작업 시작');
  },
  async () => {
    document.getElementById('status-text').textContent = '5/10 — 개발자에게 엔진 연동 위임...';
    glowAgent('dev');
    await moveAgent(agents.orc, 320, 190);

    await wait(200);
    shake(agents.dev);
    await showBubble('dev', 'Whisper 엔진 연동 시작합니다! 💻', 1500);

  },
  async () => {

    await showBubble('orc', 'R&D님, 교육 효과 검증과 영문 검수 부탁드려요!', 1800);

    shake(agents.rnd);
    await showBubble('rnd', 'CEFR 기준 난이도 검증 시작합니다! 📚', 1500);

    await moveAgent(agents.orc, 250, 185);

      sendPacket(agents.pla, agents.orc, '✅', '#dbeafe','#3B8BD4'),

    document.getElementById('start-btn').textContent = '↺ 다시 시작';
    document.getElementById('step-indicator').textContent = '';
    running = false; stepIdx = 0;
    agents.orc.style.left = '250px'; agents.orc.style.top = '210px';

];

async function startSim() {
  if (running) return;
  if (stepIdx === 0) {
    document.getElementById('log-entries').innerHTML = '';
    agents.orc.style.left = '250px'; agents.orc.style.top = '210px';
  }
  running = true;
  document.getElementById('start-btn').textContent = '⏳ 진행 중...';
  for (let i = 0; i < steps.length; i++) {
    stepIdx = i;
    document.getElementById('step-indicator').textContent = `(${i+1}/${steps.length})`;
    await steps[i]();
    await wait(350);
  }
}
</script>
